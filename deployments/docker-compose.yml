services:
  redmine-search-qdrant:
    image: qdrant/qdrant:latest
    container_name: redmine-search-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - redmine-search-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q 200 <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redmine-search-embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: redmine-search-embedding
    ports:
      - "8080:80"
    volumes:
      - ./models:/data
    command: --model-id intfloat/multilingual-e5-base
    environment:
      - HF_HUB_CACHE=/data
    networks:
      - redmine-search-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  redmine-search-indexer:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: redmine-search-indexer
    ports:
      - "8090:8090"
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      redmine-search-qdrant:
        condition: service_healthy
      redmine-search-embedding:
        condition: service_healthy
    networks:
      - redmine-search-net
    restart: unless-stopped

volumes:
  qdrant_data:

networks:
  redmine-search-net:
    driver: bridge
