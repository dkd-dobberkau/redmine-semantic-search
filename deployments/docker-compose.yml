services:
  redmine-search-qdrant:
    image: qdrant/qdrant:latest
    container_name: redmine-search-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - redmine-search-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q 200 <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Embedding service: by default uses host Ollama (EMBEDDING_URL in .env).
  # For self-contained deployment, uncomment the ollama service below and
  # set EMBEDDING_URL=http://redmine-search-embedding:11434 in .env.
  #
  # redmine-search-embedding:
  #   image: ollama/ollama:latest
  #   container_name: redmine-search-embedding
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - redmine-search-net
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "ollama", "list"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s

  redmine-search-indexer:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    image: redmine-semantic-search
    container_name: redmine-search-indexer
    ports:
      - "8090:8090"
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redmine-search-qdrant:
        condition: service_healthy
    networks:
      - redmine-search-net
    restart: unless-stopped

volumes:
  qdrant_data:

networks:
  redmine-search-net:
    driver: bridge
