<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redmine Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; }
  h1 { font-size: 1.3em; margin-bottom: 16px; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-bar input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
  .search-bar button { padding: 8px 16px; background: #4a90d9; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
  .search-bar button:hover { background: #357abd; }
  .meta { font-size: 13px; color: #666; margin-bottom: 12px; }
  .result { border-bottom: 1px solid #eee; padding: 12px 0; }
  .result:last-child { border-bottom: none; }
  .result-header { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .result a { color: #4a90d9; text-decoration: none; font-weight: 500; }
  .result a:hover { text-decoration: underline; }
  .score { font-size: 12px; color: #999; white-space: nowrap; }
  .snippet { font-size: 13px; color: #555; margin-top: 4px; line-height: 1.4; }
  .tags { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { font-size: 11px; background: #f0f0f0; padding: 2px 6px; border-radius: 3px; color: #666; }
  .error { color: #c00; font-size: 13px; }
  .empty { color: #999; font-size: 13px; }
</style>
</head>
<body>

<h1>Redmine Semantic Search</h1>

<div class="search-bar">
  <input id="q" type="text" placeholder="Search issues..." autofocus>
  <button onclick="search()">Search</button>
</div>

<div id="meta" class="meta"></div>
<div id="results"></div>

<script>
const $ = id => document.getElementById(id);
let redmineUrl = '';
let apiKey = '';

// Load config from server on startup.
fetch('/api/v1/config').then(r => r.json()).then(cfg => {
  redmineUrl = cfg.redmine_url || '';
  apiKey = cfg.api_key || '';
}).catch(() => {});

$('q').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

async function search() {
  const q = $('q').value.trim();
  if (!q) return;
  if (!apiKey) { $('results').innerHTML = '<p class="error">No API key configured.</p>'; return; }

  $('meta').textContent = 'Searching...';
  $('results').innerHTML = '';

  try {
    const res = await fetch(`/api/v1/search?q=${encodeURIComponent(q)}&limit=20`, {
      headers: { 'X-Redmine-API-Key': apiKey }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    $('meta').textContent = `${data.total} results (page ${data.page})`;

    if (!data.results || data.results.length === 0) {
      $('results').innerHTML = '<p class="empty">No results found.</p>';
      return;
    }

    $('results').innerHTML = data.results.map(r => {
      const issueUrl = redmineUrl ? `${redmineUrl}/issues/${r.issue_id}` : `#${r.issue_id}`;
      return `<div class="result">
        <div class="result-header">
          <a href="${esc(issueUrl)}" target="_blank">#${r.issue_id} — ${esc(r.subject)}</a>
          <span class="score">${(r.score * 100).toFixed(1)}%</span>
        </div>
        <p class="snippet">${esc(r.snippet)}</p>
        <div class="tags">
          <span class="tag">${esc(r.tracker)}</span>
          <span class="tag">${esc(r.status)}</span>
          <span class="tag">${esc(r.author)}</span>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    $('meta').textContent = '';
    $('results').innerHTML = `<p class="error">Error: ${esc(e.message)}</p>`;
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
</script>

</body>
</html>
